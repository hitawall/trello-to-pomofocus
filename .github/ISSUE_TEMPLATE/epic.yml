name: Epic
description: A large body of work spanning multiple issues
labels: ["type: epic"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      placeholder: What outcome does this epic deliver?
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Task checklist
      placeholder: "- [ ] #N issue title\n- [ ] #N issue title"
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of done
      placeholder: How will we know this is complete?
    validations:
      required: true
