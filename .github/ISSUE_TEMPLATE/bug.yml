name: Bug report
description: Something is not working as expected
labels: ["type: bug"]
body:
  - type: input
    id: what
    attributes:
      label: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, runtime version, browser, etc."
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [critical, high, medium, low]
      default: 2
    validations:
      required: true
