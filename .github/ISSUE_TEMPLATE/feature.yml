name: Feature request
description: Propose a new feature or improvement
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] ...\n- [ ] ..."
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [critical, high, medium, low]
      default: 2
    validations:
      required: true
