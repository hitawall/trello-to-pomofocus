# type
- name: "type: bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "type: feature"
  color: "a2eeef"
  description: "New functionality"
- name: "type: epic"
  color: "7057ff"
  description: "Large body of work"
- name: "type: task"
  color: "e4e669"
  description: "Specific unit of work"
- name: "type: chore"
  color: "fef2c0"
  description: "Maintenance, tooling, dependencies"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation only"

# priority
- name: "priority: critical"
  color: "b60205"
  description: "Drop everything"
- name: "priority: high"
  color: "e11d48"
  description: "Next sprint"
- name: "priority: medium"
  color: "f97316"
  description: "Normal backlog"
- name: "priority: low"
  color: "94a3b8"
  description: "Nice to have"

# status
- name: "status: in-progress"
  color: "2563eb"
  description: "Actively being worked on"
- name: "status: needs-review"
  color: "7c3aed"
  description: "PR open, awaiting review"
- name: "status: blocked"
  color: "1c1c1c"
  description: "Cannot proceed — dependency or question"
- name: "status: wontfix"
  color: "cfd8d7"
  description: "Intentionally not being addressed"

# size
- name: "size: XS"
  color: "dcfce7"
  description: "< 1 hour"
- name: "size: S"
  color: "bbf7d0"
  description: "Half day"
- name: "size: M"
  color: "86efac"
  description: "1–2 days"
- name: "size: L"
  color: "4ade80"
  description: "3–5 days"
- name: "size: XL"
  color: "16a34a"
  description: "> 1 week — consider splitting"
